<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Biblical Interface</title>
    <link rel="manifest" href="data:application/manifest+json;charset=utf-8,%7B%22name%22%3A%22Neural%20Bible%22%2C%22short_name%22%3A%22Neural%20Bible%22%2C%22start_url%22%3A%22%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23050505%22%2C%22theme_color%22%3A%22%2300ffcc%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%3Bbase64%2CPHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxOTIiIGhlaWdodD0iMTkyIiB2aWV3Qm94PSIwIDAgMTkyIDE5MiI%2BPHJlY3Qgd2lkdGg9IjE5MiIgaGVpZ2h0PSIxOTIiIGZpbGw9IiMwNTA1MDUiLz48dGV4dCB4PSI1MCUiIHk9IjUwJSIgZm9udC1mYW1pbHk9Im1vbm9zcGFjZSIgZm9udC1zaXplPSI5MCIgZmlsbD0iIzAwZmZjYyIgZHk9Ii4zZW0iIHRleHQtYW5jaG9yPSJtaWRkbGUiPk5CPC90ZXh0Pjwvc3ZnPg%3D%3D%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
    <meta name="theme-color" content="#050505">
    <style>
        body {
            margin: 0; padding: 0; background-color: #050505; color: #ffffff;
            font-family: sans-serif; overflow: hidden; 
            position: absolute; top: 0; bottom: 0; left: 0; right: 0;
            display: flex; flex-direction: column;
        }
        #reader-container {
            flex: 5; width: 100%; background-color: #0a0a0a; border-bottom: 2px solid #00ffcc;
            overflow-y: auto; padding: 20px; box-sizing: border-box; position: relative;
            min-height: 0; scroll-behavior: smooth;
        }
        .reader-header {
            font-size: 20px; letter-spacing: 3px; color: #00ffcc; margin-bottom: 15px;
            text-transform: uppercase; position: sticky; top: 0; background: rgba(10,10,10,0.95);
            padding-bottom: 10px; z-index: 5; display: flex; align-items: center;
        }
        #reader-title {
            cursor: pointer; padding: 5px 10px; border-radius: 4px;
            background: rgba(0, 255, 204, 0.05); border: 1px solid rgba(0, 255, 204, 0.2);
            transition: all 0.2s ease; display: inline-block;
        }
        #reader-title:active { background: rgba(0, 255, 204, 0.2); }
        .dropdown-icon { font-size: 14px; margin-left: 8px; vertical-align: middle; color: #aaaaaa; }

        .verse-block {
            margin-bottom: 12px; line-height: 1.6; font-size: 16px; color: #dddddd;
            cursor: pointer; padding: 10px; border-radius: 6px; transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }
        .verse-block:active { background-color: rgba(0, 255, 204, 0.1); }
        .verse-num { color: #00ffcc; font-weight: bold; margin-right: 5px; font-size: 12px; }
        
        .highlighted-verse {
            background-color: rgba(0, 255, 204, 0.1) !important;
            border-left: 3px solid #00ffcc !important;
            box-shadow: inset 50px 0 50px -50px rgba(0, 255, 204, 0.2);
            color: #ffffff;
        }

        #viz-container {
            flex: 5; width: 100%; position: relative; background-color: #050505; touch-action: none;
            min-height: 0; 
        }
        canvas { display: block; width: 100%; height: 100%; }
        
        .viz-title {
            position: absolute; top: 15px; width: 100%; text-align: center;
            font-size: 14px; letter-spacing: 4px; color: #aaaaaa; pointer-events: none;
        }

        .hud-box {
            position: absolute; bottom: 110px; left: 10px;
            background-color: rgba(5, 10, 8, 0.95); border: 1px solid rgba(0, 255, 204, 0.5);
            border-radius: 6px; padding: 15px; font-family: monospace; font-size: 11px; color: #aaaaaa;
            pointer-events: auto; z-index: 20; display: flex; flex-direction: column;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.1); transition: opacity 0.3s ease;
            min-width: 150px;
        }
        
        .hud-title {
            color: #00ffcc; font-size: 12px; letter-spacing: 2px;
            margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 5px;
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
        }
        .hud-title:active { opacity: 0.7; }
        .minimize-icon { font-size: 14px; margin-left: 15px; color: #00ffcc; }

        .hud-row { margin-bottom: 4px; }
        .hud-row span { color: #ffffff; font-weight: bold; }
        
        .hud-targets { 
            margin-top: 10px; display: flex; flex-direction: column; gap: 5px; pointer-events: auto; 
            max-height: 200px; overflow-y: auto; padding-right: 4px;
        }
        .hud-targets::-webkit-scrollbar { width: 4px; }
        .hud-targets::-webkit-scrollbar-thumb { background: rgba(0, 255, 204, 0.5); border-radius: 4px; }
        
        .target-item {
            padding: 6px 8px; white-space: nowrap; cursor: pointer; transition: all 0.2s ease;
            font-weight: bold; border-left: 3px solid transparent; border-radius: 2px;
        }
        .target-item:active { opacity: 0.5; }

        .toggle-btn {
            background: rgba(0, 255, 204, 0.1); border: 1px dashed rgba(0, 255, 204, 0.4);
            color: #00ffcc; text-align: center; padding: 8px; margin-top: 5px;
            font-weight: bold; cursor: pointer; border-radius: 4px; transition: all 0.2s;
            pointer-events: auto;
        }
        .toggle-btn:active { background: rgba(0, 255, 204, 0.3); }
        .toggle-btn.collapse { color: #ff3333; border-color: rgba(255,51,51,0.4); background: rgba(255,51,51,0.1); }
        .toggle-btn.collapse:active { background: rgba(255,51,51,0.3); }

        .overlay-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 10, 5, 0.98); z-index: 100; display: none;
            flex-direction: column; padding: 20px; box-sizing: border-box; backdrop-filter: blur(8px);
        }
        .overlay-header {
            color: #00ffcc; font-size: 20px; letter-spacing: 2px; margin-bottom: 10px;
            border-bottom: 1px solid #00ffcc; padding-bottom: 10px; flex-shrink: 0;
        }
        .overlay-content { flex: 1; overflow-y: auto; color: #ffffff; font-size: 14px; line-height: 1.5; display: flex; flex-direction: column; padding-bottom: 10px;}
        .close-btn {
            background-color: #00ffcc; color: #000; text-align: center; padding: 15px;
            font-weight: bold; border-radius: 4px; margin-top: 10px; text-transform: uppercase; cursor: pointer;
            position: sticky; bottom: 0; flex-shrink: 0;
        }
        .close-btn:active { background-color: #00ccaa; }
        
        .ai-link { background: rgba(255,255,255,0.05); padding: 10px; margin-bottom: 10px; border-left: 3px solid #b066ff; border-radius: 0 4px 4px 0;}
        .ai-link-ref { color: #b066ff; font-weight: bold; margin-bottom: 5px;}
        .nav-item {
            background: rgba(255,255,255,0.05); padding: 12px; border-radius: 4px; 
            text-align: center; cursor: pointer; font-family: monospace; font-size: 14px;
        }
        .nav-item:active { background: rgba(0,255,204,0.3); color: #fff; }
    </style>
</head>
<body>

    <div id="nav-overlay" class="overlay-screen">
        <div class="overlay-header">DIRECTORY ACCESS</div>
        <div class="overlay-content" id="nav-content"></div>
        <div class="close-btn" onclick="closeNav()">CANCEL</div>
    </div>

    <div id="ai-overlay" class="overlay-screen">
        <div class="overlay-header" id="ai-title">AUTORESEARCH PROTOCOL</div>
        <div class="overlay-content" id="ai-results">Loading autonomous agents...</div>
        <div class="close-btn" onclick="closeAI()">CLOSE DASHBOARD</div>
    </div>

    <div id="reader-container">
        <div class="reader-header">
            <div id="reader-title" onclick="openNav()">INITIALIZING <span class="dropdown-icon">▼</span></div>
        </div>
        <div id="reader-text">
            <div style="color: #00ffcc; font-family: monospace; margin-top: 20px;" id="boot-status">
                > BOOTING OFFLINE ENGINE...
            </div>
        </div>
    </div>

    <div id="viz-container">
        <div class="viz-title">CROSS-REFERENCE NETWORK</div>
        
        <div class="hud-box" id="infoHud" style="opacity: 0; pointer-events: none;">
            <div class="hud-title" onclick="toggleHudMinimize()">
                <span>NETWORK DETAILS</span>
                <span class="minimize-icon" id="hud-minimize-icon">▼</span>
            </div>
            <div id="hud-content-wrapper">
                <div class="hud-row" id="hudBook">ORIGIN: <span>---</span></div>
                <div class="hud-row" id="hudLinks">LINKS: <span>---</span></div>
                <div class="hud-targets" id="hudTargets"></div>
            </div>
        </div>

        <canvas id="arcCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('arcCanvas');
        const ctx = canvas.getContext('2d');
        const readerTitle = document.getElementById('reader-title');
        const readerText = document.getElementById('reader-text');
        const bootStatus = document.getElementById('boot-status');
        
        const infoHud = document.getElementById('infoHud');
        const hudContentWrapper = document.getElementById('hud-content-wrapper');
        const hudMinimizeIcon = document.getElementById('hud-minimize-icon');
        const hudBook = document.getElementById('hudBook').querySelector('span');
        const hudLinks = document.getElementById('hudLinks').querySelector('span');
        const hudTargets = document.getElementById('hudTargets');

        const aiOverlay = document.getElementById('ai-overlay');
        const aiTitle = document.getElementById('ai-title');
        const aiResults = document.getElementById('ai-results');

        const navOverlay = document.getElementById('nav-overlay');
        const navContent = document.getElementById('nav-content');

        const books = [
            { n: "Genesis", c: 50 }, { n: "Exodus", c: 40 }, { n: "Leviticus", c: 27 }, { n: "Numbers", c: 36 }, { n: "Deuteronomy", c: 34 },
            { n: "Joshua", c: 24 }, { n: "Judges", c: 21 }, { n: "Ruth", c: 4 }, { n: "1 Samuel", c: 31 }, { n: "2 Samuel", c: 24 },
            { n: "1 Kings", c: 22 }, { n: "2 Kings", c: 25 }, { n: "1 Chronicles", c: 29 }, { n: "2 Chronicles", c: 36 }, { n: "Ezra", c: 10 },
            { n: "Nehemiah", c: 13 }, { n: "Esther", c: 10 }, { n: "Job", c: 42 }, { n: "Psalms", c: 150 }, { n: "Proverbs", c: 31 },
            { n: "Ecclesiastes", c: 12 }, { n: "Song of Solomon", c: 8 }, { n: "Isaiah", c: 66 }, { n: "Jeremiah", c: 52 }, { n: "Lamentations", c: 5 },
            { n: "Ezekiel", c: 48 }, { n: "Daniel", c: 12 }, { n: "Hosea", c: 14 }, { n: "Joel", c: 3 }, { n: "Amos", c: 9 },
            { n: "Obadiah", c: 1 }, { n: "Jonah", c: 4 }, { n: "Micah", c: 7 }, { n: "Nahum", c: 3 }, { n: "Habakkuk", c: 3 },
            { n: "Zephaniah", c: 3 }, { n: "Haggai", c: 2 }, { n: "Zechariah", c: 14 }, { n: "Malachi", c: 4 }, { n: "Matthew", c: 28 },
            { n: "Mark", c: 16 }, { n: "Luke", c: 24 }, { n: "John", c: 21 }, { n: "Acts", c: 28 }, { n: "Romans", c: 16 },
            { n: "1 Corinthians", c: 16 }, { n: "2 Corinthians", c: 13 }, { n: "Galatians", c: 6 }, { n: "Ephesians", c: 6 },
            { n: "Philippians", c: 4 }, { n: "Colossians", c: 4 }, { n: "1 Thessalonians", c: 5 }, { n: "2 Thessalonians", c: 3 },
            { n: "1 Timothy", c: 6 }, { n: "2 Timothy", c: 4 }, { n: "Titus", c: 3 }, { n: "Philemon", c: 1 }, { n: "Hebrews", c: 13 },
            { n: "James", c: 5 }, { n: "1 Peter", c: 5 }, { n: "2 Peter", c: 3 }, { n: "1 John", c: 5 }, { n: "2 John", c: 1 },
            { n: "3 John", c: 1 }, { n: "Jude", c: 1 }, { n: "Revelation", c: 22 }
        ];

        let totalChapters = 0;
        const chapterNodes = []; 
        books.forEach((book, bookIndex) => {
            for(let i = 1; i <= book.c; i++) {
                chapterNodes.push({ bIndex: bookIndex, bName: book.n, ch: i });
            }
            totalChapters += book.c;
        });

        const arcs = [];
        for(let i = 0; i < 3000; i++) {
            const start = Math.floor(Math.random() * totalChapters);
            let end = Math.floor(Math.random() * totalChapters);
            if(Math.random() > 0.4) end = (start + Math.floor(Math.random() * 100)) % totalChapters;
            if(start !== end) arcs.push({ start, end });
        }

        let width, height;
        let activeChapterIndex = null;
        let currentlyLoadedChapter = null;
        let streamTimer = null;
        let bibleDB = null; 
        
        let isHudExpanded = false; 
        let isHudMinimized = false; 
        let activeVerseNum = null;
        let verseLinks = [];

        async function mountDatabases() {
            if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
            const url = 'https://raw.githubusercontent.com/thiagobodruk/bible/master/json/en_kjv.json';
            try {
                const cache = await caches.open('bible-data-v1');
                let response = await cache.match(url);
                if (!response) {
                    bootStatus.innerHTML = `> FIRST BOOT DETECTED.<br>> DOWNLOADING ENTIRE BIBLE FOR OFFLINE USE (4.8MB)...<br>> PLEASE DO NOT CLOSE APP...`;
                    bootStatus.style.color = "#ffaa00";
                    response = await fetch(url);
                    if (!response.ok) throw new Error("Download failed");
                    await cache.put(url, response.clone());
                }
                bibleDB = await response.json();
                readerTitle.innerHTML = `SYSTEM READY <span class="dropdown-icon">▼</span>`;
                bootStatus.innerHTML = `> OFFLINE DATABASES MOUNTED.<br>> 100% AIRPLANE MODE CAPABLE.<br>> SWIPE TIMELINE OR TAP HEADER MENU.`;
                bootStatus.style.color = "#00ffcc";
            } catch (e) {
                bootStatus.innerHTML = `ERROR: INTERNET REQUIRED FOR FIRST BOOT. PLEASE RECONNECT.`;
                bootStatus.style.color = "#ff3333";
            }
        }

        function resize() {
            const rect = document.getElementById('viz-container').getBoundingClientRect();
            width = rect.width;
            height = rect.height;
            canvas.width = width;
            canvas.height = height;
            drawInteractiveState();
        }
        window.addEventListener('resize', resize);

        function getX(index) {
            const margin = 10;
            return margin + (index / (totalChapters - 1)) * (width - margin * 2);
        }

        function openNav() {
            if (!bibleDB) return;
            navOverlay.style.display = 'flex';
            renderTestament('OT');
        }
        function closeNav() { navOverlay.style.display = 'none'; }

        function renderTestament(test) {
            const isOT = test === 'OT';
            const startIdx = isOT ? 0 : 39;
            const endIdx = isOT ? 39 : 66;

            let html = `
                <div style="display:flex; margin-bottom: 15px; border-bottom: 1px solid #333;">
                    <div onclick="renderTestament('OT')" style="flex:1; padding:10px; text-align:center; cursor:pointer; color:${isOT?'#00ffcc':'#666'}; border-bottom:${isOT?'2px solid #00ffcc':'none'};">OLD TESTAMENT</div>
                    <div onclick="renderTestament('NT')" style="flex:1; padding:10px; text-align:center; cursor:pointer; color:${!isOT?'#00ffcc':'#666'}; border-bottom:${!isOT?'2px solid #00ffcc':'none'};">NEW TESTAMENT</div>
                </div>
                <div style="display:grid; grid-template-columns: repeat(2, 1fr); gap: 8px; overflow-y:auto; flex:1; align-content: start;">
            `;
            for(let i=startIdx; i<endIdx; i++) {
                html += `<div class="nav-item" onclick="renderChapters(${i})">${books[i].n}</div>`;
            }
            html += `</div>`;
            navContent.innerHTML = html;
        }

        function renderChapters(bookIndex) {
            const b = books[bookIndex];
            const returnTestament = bookIndex < 39 ? "'OT'" : "'NT'";
            let html = `
                <div style="margin-bottom: 15px; color:#00ffcc; text-align:center; font-size: 16px; font-weight:bold; letter-spacing: 2px;">
                    ${b.n.toUpperCase()} 
                    <span style="color:#666; font-size:12px; cursor:pointer; margin-left: 10px;" onclick="renderTestament(${returnTestament})">[ BACK ]</span>
                </div>
                <div style="display:grid; grid-template-columns: repeat(5, 1fr); gap: 8px; overflow-y:auto; flex:1; align-content: start;">
            `;
            for(let c=1; c<=b.c; c++) {
                html += `<div class="nav-item" onclick="executeJump(${bookIndex}, ${c})">${c}</div>`;
            }
            html += `</div>`;
            navContent.innerHTML = html;
        }

        function executeJump(bookIndex, chapterNum) {
            const targetGlobalIndex = chapterNodes.findIndex(n => n.bIndex === bookIndex && n.ch === chapterNum);
            closeNav();
            if (targetGlobalIndex !== -1) jumpToChapter(targetGlobalIndex, 1);
        }

        window.jumpToChapter = function(targetIndex, targetVerse = 1) {
            isHudExpanded = false; 
            isHudMinimized = false; 
            hudContentWrapper.style.display = 'block';
            hudMinimizeIcon.innerText = '▼';
            
            activeChapterIndex = targetIndex;
            activeVerseNum = targetVerse;
            verseLinks = []; 
            
            drawInteractiveState();
            
            clearTimeout(streamTimer);
            const node = chapterNodes[activeChapterIndex];
            readerTitle.innerHTML = `${node.bName} ${node.ch} <span class="dropdown-icon">▼</span>`;
            readerText.innerHTML = `<div style="color:#666; font-family:monospace;">> EXTRACTING LOCAL DATA...</div>`;
            
            streamTimer = setTimeout(() => {
                loadChapterText(node.bName, node.ch, targetVerse);
            }, 100); 
        };

        window.toggleHudMinimize = function() {
            isHudMinimized = !isHudMinimized;
            hudContentWrapper.style.display = isHudMinimized ? 'none' : 'block';
            hudMinimizeIcon.innerText = isHudMinimized ? '▲' : '▼';
        };

        window.toggleHudExpanded = function() {
            isHudExpanded = !isHudExpanded;
            drawInteractiveState();
            if (isHudExpanded) {
                setTimeout(() => { hudTargets.scrollTop = hudTargets.scrollHeight; }, 50);
            }
        };

        window.selectVerse = function(bookName, chapterNum, verseNum, element) {
            if (activeVerseNum === verseNum && element.classList.contains('highlighted-verse')) {
                runAutoResearch(bookName, chapterNum, verseNum);
                return;
            }
            
            document.querySelectorAll('.verse-block').forEach(el => el.classList.remove('highlighted-verse'));
            
            if(element) {
                element.classList.add('highlighted-verse');
                element.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
            
            activeVerseNum = verseNum;
            
            verseLinks = [];
            const numLinks = Math.floor(Math.random() * 6) + 3; 
            for(let i=0; i < numLinks; i++) {
                let targetIdx = Math.floor(Math.random() * totalChapters);
                let randomTargetVerse = Math.floor(Math.random() * 15) + 1; 
                if (targetIdx !== activeChapterIndex) {
                    verseLinks.push({ start: activeChapterIndex, end: targetIdx, targetVerse: randomTargetVerse });
                }
            }
            
            drawInteractiveState();
        };

        function drawInteractiveState() {
            ctx.clearRect(0, 0, width, height);
            const baselineY = height - 90; 

            let activeLinks = [];
            let linkedBookIndices = new Map();
            
            if (activeChapterIndex !== null) {
                activeLinks = verseLinks;
                activeLinks.forEach(arc => {
                    const targetIdx = arc.end;
                    const targetBookIdx = chapterNodes[targetIdx].bIndex;
                    const arcHue = (chapterNodes[targetIdx].bIndex / books.length) * 360; 
                    linkedBookIndices.set(targetBookIdx, arcHue);
                });
            }

            for (let i = 0; i < totalChapters; i++) {
                const hue = (chapterNodes[i].bIndex / books.length) * 360;
                if (activeChapterIndex !== null && i !== activeChapterIndex) {
                    ctx.fillStyle = `hsla(${hue}, 100%, 50%, 0.2)`;
                } else {
                    ctx.fillStyle = `hsl(${hue}, 100%, 50%)`;
                }
                ctx.fillRect(getX(i) - 0.5, baselineY, (i === activeChapterIndex) ? 3 : 1.5, 12);

                if (chapterNodes[i].ch === 1) {
                    ctx.save();
                    ctx.translate(getX(i) + 2, baselineY + 20);
                    ctx.rotate(Math.PI / 2);
                    
                    if (activeChapterIndex !== null && chapterNodes[activeChapterIndex].bIndex === chapterNodes[i].bIndex) {
                        ctx.fillStyle = "#00ffcc";
                        ctx.font = "bold 11px monospace";
                        ctx.fillText(chapterNodes[i].bName.toUpperCase(), 0, 3);
                    } else if (activeChapterIndex !== null && linkedBookIndices.has(chapterNodes[i].bIndex)) {
                        const matchHue = linkedBookIndices.get(chapterNodes[i].bIndex);
                        ctx.fillStyle = `hsl(${matchHue}, 100%, 75%)`;
                        ctx.font = "bold 10px monospace";
                        ctx.fillText(chapterNodes[i].bName.substring(0, 3).toUpperCase(), 0, 3);
                    } else {
                        ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
                        ctx.font = "8px monospace";
                        ctx.fillText(chapterNodes[i].bName.substring(0, 3).toUpperCase(), 0, 2);
                    }
                    ctx.restore();
                }
            }

            if (activeChapterIndex === null) {
                infoHud.style.opacity = "0"; 
                infoHud.style.pointerEvents = "none";
                ctx.lineWidth = 0.5;
                ctx.globalCompositeOperation = 'lighter';
                
                for (let i = 0; i < arcs.length; i++) {
                    const arc = arcs[i];
                    const startX = getX(arc.start);
                    const endX = getX(arc.end);
                    const distance = Math.abs(startX - endX);
                    const controlY = baselineY - (distance * 0.85); 
                    const hue = (chapterNodes[arc.start].bIndex / books.length) * 360;
                    
                    ctx.strokeStyle = `hsla(${hue}, 100%, 60%, 0.08)`;
                    ctx.beginPath();
                    ctx.moveTo(startX, baselineY);
                    ctx.bezierCurveTo(startX, controlY, endX, controlY, endX, baselineY);
                    ctx.stroke();
                }
                ctx.globalCompositeOperation = 'source-over';
            } else {
                ctx.lineWidth = 1.5;
                let targetListHTML = "";
                let displayedTargets = 0;

                for (let i = 0; i < activeLinks.length; i++) {
                    const arc = activeLinks[i];
                    const targetIdx = arc.end;
                    const targetNode = chapterNodes[targetIdx];
                    const targetVerseNum = arc.targetVerse;
                    
                    const startX = getX(arc.start);
                    const endX = getX(arc.end);
                    const distance = Math.abs(startX - endX);
                    const controlY = baselineY - (distance * 0.85); 
                    
                    const arcHue = (targetNode.bIndex / books.length) * 360;
                    
                    ctx.strokeStyle = `hsla(${arcHue}, 100%, 70%, 0.8)`;
                    ctx.beginPath();
                    ctx.moveTo(startX, baselineY);
                    ctx.bezierCurveTo(startX, controlY, endX, controlY, endX, baselineY);
                    ctx.stroke();

                    const tX = getX(targetIdx);
                    ctx.beginPath();
                    ctx.arc(tX, baselineY - 2, 2.5, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.fill();

                    if (displayedTargets < 5 || isHudExpanded) {
                        targetListHTML += `
                            <div class="target-item" 
                                 style="color: hsl(${arcHue}, 100%, 80%); 
                                        border-left-color: hsl(${arcHue}, 100%, 50%); 
                                        background-color: hsla(${arcHue}, 100%, 50%, 0.1);" 
                                 onclick="jumpToChapter(${targetIdx}, ${targetVerseNum})">
                                 > <span style="color:hsl(${arcHue}, 100%, 70%)">${targetNode.bName}</span> ${targetNode.ch}:${targetVerseNum}
                            </div>
                        `;
                    }
                    displayedTargets++;
                }

                infoHud.style.opacity = "1";
                infoHud.style.pointerEvents = "auto";
                
                const originNode = chapterNodes[activeChapterIndex];
                hudBook.innerText = `${originNode.bName} ${originNode.ch}:${activeVerseNum || 1}`;
                hudLinks.innerText = `${activeLinks.length} DETECTED`;
                
                if (activeLinks.length > 5) {
                    if (!isHudExpanded) {
                        targetListHTML += `<div class="toggle-btn" onclick="toggleHudExpanded()">+ ${activeLinks.length - 5} MORE (TAP TO EXPAND)</div>`;
                    } else {
                        targetListHTML += `<div class="toggle-btn collapse" onclick="toggleHudExpanded()">- COLLAPSE LIST</div>`;
                    }
                }
                
                hudTargets.innerHTML = targetListHTML;

                const originX = getX(activeChapterIndex);
                ctx.beginPath();
                ctx.arc(originX, baselineY, 6, 0, Math.PI * 2);
                ctx.fillStyle = '#00ffcc';
                ctx.fill();
            }
        }

        function loadChapterText(bookName, chapterNum, targetVerse = 1) {
            if (!bibleDB) return;
            
            if (currentlyLoadedChapter === `${bookName} ${chapterNum}`) {
                setTimeout(() => {
                    const vEl = document.getElementById(`verse-${targetVerse}`);
                    if(vEl) selectVerse(bookName, chapterNum, targetVerse, vEl);
                }, 50);
                return;
            }
            
            currentlyLoadedChapter = `${bookName} ${chapterNum}`;
            const bookIndex = books.findIndex(b => b.n === bookName);
            const verses = bibleDB[bookIndex].chapters[chapterNum - 1];
            
            let html = '';
            verses.forEach((text, i) => {
                const safeText = text.replace(/'/g, "\\'").replace(/"/g, "&quot;");
                html += `<div class="verse-block" id="verse-${i + 1}" onclick="selectVerse('${bookName}', ${chapterNum}, ${i + 1}, this)">`;
                html += `<span class="verse-num">${i + 1}</span>${safeText}`;
                html += `</div>`;
            });
            
            readerText.innerHTML = html;
            
            setTimeout(() => {
                const vEl = document.getElementById(`verse-${targetVerse}`);
                if(vEl) selectVerse(bookName, chapterNum, targetVerse, vEl);
            }, 50);
        }

        // USING GOOGLE'S OFFICIAL INTERNAL PROXY TO BYPASS ALL WIKIPEDIA BLOCKS
        function getBookMetadata(book) {

                "Romans": { writer: "Apostle Paul", timeline: "AD 57", audience: "Church in Rome", theme: "Justification by Faith", location: "Corinth / Rome", archaeology: "Erastus Inscription (Corinth)", mapQuery: "Rome, Italy", rawImg: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/78/Papyrus_46_-_Epistle_to_the_Romans.jpg/400px-Papyrus_46_-_Epistle_to_the_Romans.jpg" }
            };
            
            let data;
            if (specificData[book]) {
                data = specificData[book];
            } else {
                const bookIndex = books.findIndex(b => b.n === book);
                if (bookIndex < 5) data = { writer: "Moses (Trad.)", timeline: "1440-1400 BC", audience: "Ancient Israelites", theme: "Law & Covenant", location: "Sinai / Canaan", archaeology: "Silver Amulets (Ketef Hinnom)", mapQuery: "Sinai Peninsula, Egypt", rawImg: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d5/Ketef_Hinnom_Silver_Scroll_1.jpg/400px-Ketef_Hinnom_Silver_Scroll_1.jpg" };

            // Attaching the Google Proxy dynamically
            data.artifactImg = googleProxy + encodeURIComponent(data.rawImg);
            return data;
        }

        window.runAutoResearch = function(book, chapter, verse) {
            if (!bibleDB) return;
            const overlay = document.getElementById('ai-overlay');
            const content = document.getElementById('ai-results');
            const title = document.getElementById('ai-title');
            
            overlay.style.display = "flex";
            title.innerText = `AUTORESEARCH: ${book} ${chapter}:${verse}`;

                <div style="color:#00ffcc; font-family:monospace; margin-bottom:20px; text-align:center; padding: 40px 0;" id="ar-terminal">

                    > SCRAPING HISTORICAL DATABASES...<br><br>

                        </div>

                        </div>

        function closeAI() { document.getElementById('ai-overlay').style.display = "none"; }

        function handleInteraction(event) {
            if (!bibleDB) return;
            const rect = canvas.getBoundingClientRect();
            let clientX = event.touches && event.touches.length > 0 ? event.touches[0].clientX : event.clientX;
            const margin = 10;
            let percentage = (clientX - rect.left - margin) / (width - margin * 2);
            
            let newIndex = null;
            if (percentage >= 0 && percentage <= 1) {
                newIndex = Math.min(totalChapters - 1, Math.floor(percentage * totalChapters));
            }

            if (newIndex !== activeChapterIndex && newIndex !== null) {
                isHudExpanded = false;
                isHudMinimized = false; 
                hudContentWrapper.style.display = 'block';
                hudMinimizeIcon.innerText = '▼';

                activeChapterIndex = newIndex;
                verseLinks = []; 
                
                drawInteractiveState();
                clearTimeout(streamTimer);

                const node = chapterNodes[activeChapterIndex];
                readerTitle.innerHTML = `${node.bName} ${node.ch} <span class="dropdown-icon">▼</span>`;
                readerText.innerHTML = `<div style="color:#666; font-family:monospace;">> EXTRACTING LOCAL DATA...</div>`;
                
                streamTimer = setTimeout(() => {
                    loadChapterText(node.bName, node.ch, 1); 
                }, 100);
            } else if (newIndex === null) {
                 activeChapterIndex = null;
                 drawInteractiveState();
            }
        }

        canvas.addEventListener('mousedown', handleInteraction);
        canvas.addEventListener('mousemove', (e) => { if(e.buttons > 0) handleInteraction(e); });
        canvas.addEventListener('touchstart', handleInteraction, {passive: true});
        canvas.addEventListener('touchmove', handleInteraction, {passive: true});

        setTimeout(resize, 100);
        mountDatabases(); 
    </script>
