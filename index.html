<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Diagram Visualization</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #ffffff;
            font-family: sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        #canvas-container {
            width: 100%;
            height: 90vh; /* Made taller */
            position: relative;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .title {
            position: absolute;
            top: 20px;
            text-align: center;
            width: 100%;
            font-size: 24px;
            letter-spacing: 2px;
            opacity: 0.8;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="title">DATA CONNECTIONS</div>
    <div id="canvas-container">
        <canvas id="arcCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('arcCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        const nodesCount = 300; // More points
        const arcsCount = 4000; // More lines
        const arcs = [];
        const nodePositions = [];

        function resize() {
            width = canvas.parentElement.clientWidth;
            height = canvas.parentElement.clientHeight;
            canvas.width = width;
            canvas.height = height;
            initData();
        }

        window.addEventListener('resize', resize);

        function initData() {
            // Reset data
            arcs.length = 0;
            nodePositions.length = 0;
            
            const baselineY = height - 20;
            const margin = 20;
            const drawableWidth = width - (margin * 2);

            // Calculate bottom points
            for (let i = 0; i < nodesCount; i++) {
                nodePositions.push(margin + (i / (nodesCount - 1)) * drawableWidth);
            }

            // Calculate connections
            for (let i = 0; i < arcsCount; i++) {
                const startIndex = Math.floor(Math.random() * nodesCount);
                let endIndex = Math.floor(Math.random() * nodesCount);
                
                if (Math.random() > 0.6) {
                    endIndex = (startIndex + Math.floor(Math.random() * 50) + 1) % nodesCount;
                }

                if (startIndex !== endIndex) {
                    arcs.push({ start: startIndex, end: endIndex });
                }
            }
            
            ctx.clearRect(0, 0, width, height);
            
            // Draw the solid bottom rainbow bar
            for (let i = 0; i < nodesCount; i++) {
                const hue = (i / nodesCount) * 360;
                ctx.fillStyle = `hsl(${hue}, 100%, 50%)`;
                ctx.fillRect(nodePositions[i] - 1, baselineY, 2, 20);
            }

            // Start the drawing animation
            drawAnimation(0, baselineY);
        }

        function drawAnimation(index, baselineY) {
            // Draw 20 lines per frame so it animates smoothly
            for (let j = 0; j < 20; j++) {
                if (index >= arcs.length) return;

                const arc = arcs[index];
                const startX = nodePositions[arc.start];
                const endX = nodePositions[arc.end];
                const distance = Math.abs(startX - endX);
                
                // Calculate curve height based on distance
                const controlY = baselineY - (distance * 0.9); 
                
                const hue = (arc.start / nodesCount) * 360;
                
                ctx.lineWidth = 0.5;
                ctx.strokeStyle = `hsla(${hue}, 100%, 60%, 0.15)`; 

                ctx.beginPath();
                ctx.moveTo(startX, baselineY);
                ctx.bezierCurveTo(startX, controlY, endX, controlY, endX, baselineY);
                ctx.stroke();

                index++;
            }
            
            // Tell the browser to keep drawing the next batch
            requestAnimationFrame(() => drawAnimation(index, baselineY));
        }

        // Start everything
        resize();
    </script>
</body>
</html>
